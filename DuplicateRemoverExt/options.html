<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Extension Options</title>
</head>
<body>
    <h2>URL 패턴 설정</h2>
    <textarea id="urlPatterns" rows="4" style="width: 300px;"></textarea>

    <h2>단어 Dictionary (선택)</h2>
    <textarea id="dictionary" rows="4" style="width: 300px;"></textarea>

    <h2>상품명 중복 input 선택자</h2>
    <input type="text" id="inputBSelector" style="width: 300px;">

    <h2>쿠팡 상품명 Input 선택자</h2>
    <input type="text" id="inputCSelector" style="width: 300px;">

    <h2>완료 버튼 지연 시간 (ms)</h2>
    <input type="number" id="completeDelayMs" min="100" max="3000" step="100" value="400" style="width: 80px;"> ms

    <h2>뒤로가기 버튼 선택자</h2>
    <input type="text" id="backBtnSelector" style="width: 300px;" placeholder="button.sc-jgFdch.evvnFR">

    <h2>「전체」 버튼 동작</h2>
    <label>
      <input type="checkbox" id="skipBrandOnRunAll">
      전체 실행 시 비브랜드 태그 건너뛰기 (중복 제거 → 대표 썸네일만)
    </label>

    <br><br>
    <button id="saveBtn">저장하기</button>
    <script src="defaults.js"></script>
    <script src="options.js"></script>
</body>
</html>
